name: Deploying to Staging

on:
  push:
    branches:
      - main

jobs:

  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ vars.VITE_API_URL }} \
            -t raouamth/frontend-session16:${{ github.run_number }} .

      - name: Push Docker image
        run: |
          docker push raouamth/frontend-session16:${{ github.run_number }}


  deploy:
    name: Deploy to Server
    needs: build_and_push
    runs-on: [self-hosted, devops]

    steps:
      - name: Deploy with Docker Compose
        run: |
          cd /home/raoua/devops-script/frontend

          # pass the image tag dynamically
          export IMAGE_TAG=${{ github.run_number }}

          docker compose pull
          docker compose up -d --force-recreate